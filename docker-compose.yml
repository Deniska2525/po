services:
  backend:
    build: ./backend
    container_name: marketplace-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: marketplace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    #restart: unless-stopped